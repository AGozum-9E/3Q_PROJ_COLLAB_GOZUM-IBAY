    <div class="card">
        <h2>Team Checker</h2>
<form>
    <label>Are you done with online registration?</label><br>
    <select id="requirement1">
        <option value="">Select</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select><br><br>

    <label>Do you have a medical certificate?</label><br>
    <select id="requirement2">
        <option value="">Select</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
    </select><br><br>

    <label>Grade:</label><br>
    <select id="grade">
        <option value="">Select grade</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
    </select><br><br>

    <label>Section:</label>
    <select id="section">
        <option value="">Select section</option>
        <option value="Ruby">Ruby</option>
        <option value="Emerald">Emerald</option>
        <option value="Sapphire">Sapphire</option>
        <option value="Topaz">Topaz</option>
    </select>

    <div class="center">
        <input class="btn" type="button" value="Check Team" py-click="team_checker_form">
    </div>

        </form>
